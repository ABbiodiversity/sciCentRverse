url: https://ABbiodiversity.github.io/sciCentRverse/

template:
  bootstrap: 5
  bootswatch: flatly

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [github]
  components:
    articles:
      text: Articles
      menu:
        - text: "Camera Trap Density Workflow"
          href: articles/cam-workflow.html

reference:
  - title: "Camera Trap Functions"
    desc: >
      A pipeline for estimating wildlife density from camera trap data
      using the time-in-front-of-camera (TIFC) method.
    contents:
      - cam_get_op_days
      - cam_summarise_op_by_season
      - cam_consolidate_tags
      - cam_obtain_n_gap_class
      - cam_calc_time_by_series
      - cam_sum_total_time
      - cam_extract_model_lookup
      - cam_calc_density_by_loc

  - title: "Spatial & Mapping Utilities"
    desc: Functions for spatial data processing and map styling.
    contents:
      - matches("theme_science")
      - add_alberta_flag

  - title: "General Utilities"
    desc: Miscellaneous data processing and helper functions.
    contents:
      - estimate_processing_time
      - extract_by_year
      - format_time_diff
      - load_most_recent_data
      - load_rdata_files
      - parallel_extract_directory
      - read_tifs_to_list
      - read_tifs_to_multiband
      - sample_blocks
      - select_one_response
      - select_species
      - set_terra_options
      - snake_case
      - style_active_file
      - summarize_column_classes
